<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;}
.box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:36px;width:100%;max-width:420px;margin:24px;}

.msg{margin-top:16px;padding:12px 16px;border-radius:6px;font-size:13px;display:none;}
.msg.error{background:rgba(220,50,50,0.15);border:1px solid rgba(220,50,50,0.3);color:#ff6b6b;display:block;}
.msg.success{background:rgba(70,130,180,0.15);border:1px solid rgba(70,130,180,0.3);color:#6ba0c8;display:block;}
